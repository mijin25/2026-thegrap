<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORK — THE GRAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <script src="gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/grap-header.js"></script>
  <style>
    /* ── WORK 페이지 전용 스타일 ── */
    .work-section { padding: clamp(80px,10vw,140px) var(--gutter); }
    .work-section--no-hero { padding-top: calc(var(--header-h, 72px) + clamp(60px,8vw,120px)); }
    .work-filters {
      display: flex; flex-wrap: wrap; align-items: baseline;
      gap: 0; margin-bottom: clamp(48px, 6vw, 88px);
    }
    .filter-btn {
      font-family: 'PP Neue Montreal', sans-serif; font-weight: 700;
      font-size: clamp(2rem, 4vw, 5rem);
      line-height: 1; letter-spacing: -.02em;
      color: var(--c-on-bg);
      background: none; border: none; cursor: pointer;
      padding: 0; text-decoration: none;
    }
    .filter-btn::after { content: ',\00a0'; color: var(--c-on-bg); }
    .filter-btn:last-child::after { content: ''; }
    .filter-btn span {
      background-image: linear-gradient(currentColor, currentColor);
      background-repeat: no-repeat;
      background-position: left bottom 0.08em;
      background-size: 0% 1px;
      transition: background-size .4s cubic-bezier(.25,.1,.25,1);
    }
    .filter-btn:hover span,
    .filter-btn.active span { background-size: 100% 1px; }
    .work-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; max-width: 1400px; }
    @media(max-width:900px) { .work-grid { grid-template-columns: 1fr 1fr; } }
    @media(max-width:480px) { .work-grid { grid-template-columns: 1fr; } }
    .work-item { position: relative; overflow: hidden; aspect-ratio: 4/5; background: #111; cursor: pointer; }
    .work-item.featured { grid-column: 1/3; aspect-ratio: 16/7; }
    @media(max-width:900px) { .work-item.featured { grid-column: 1/2; aspect-ratio: 4/5; } }
    .work-item-bg { width: 100%; height: 100%; transition: transform .7s cubic-bezier(.4,0,.2,1); }
    .work-item:hover .work-item-bg { transform: scale(1.04); }
    .work-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 28px; background: linear-gradient(to top,rgba(0,0,0,.82) 0%,transparent 55%); opacity: 0; transition: opacity .4s; }
    .work-item:hover .work-overlay { opacity: 1; }
    .work-tag { font-size: var(--text-sm); letter-spacing: .15em; text-transform: uppercase; color: rgba(204,255,0,.85); margin-bottom: 6px; }
    .work-name { font-family: 'PP Neue Montreal', sans-serif; font-weight: 500; font-size: clamp(1rem,2vw,1.4rem); color: var(--c-on-bg); letter-spacing: -.01em; }
    .work-year { font-size: var(--text-sm); color: var(--c-secondary); margin-top: 4px; }
    .work-item-bg .label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'PP Neue Montreal', sans-serif; font-size: clamp(2rem,8vw,5rem); font-weight: 700; letter-spacing: -.04em; color: rgba(247,247,245,.04); text-transform: uppercase; }
    .c1{background:linear-gradient(135deg,#181818,#282828);}
    .c2{background:linear-gradient(135deg,#141414,#242424);}
    .c3{background:linear-gradient(135deg,#1c1c1c,#2c2c2c);}
    .c4{background:linear-gradient(135deg,#101010,#202020);}
    .c5{background:linear-gradient(135deg,#161616,#262626);}
    .c6{background:linear-gradient(135deg,#121212,#222222);}
  </style>
</head>
<body>
  <div id="grain"></div>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <grap-header active="work"></grap-header>

  <!-- ============================
       포트폴리오 그리드 — 수정 가능
       아이템 추가: .work-item 블록 복사
       첫 번째 아이템에 featured 클래스 = 와이드
       ============================ -->
  <section class="work-section work-section--no-hero">
    <div class="work-filters reveal">
      <button class="filter-btn active" data-filter="all"><span data-i18n="work.filter.all">All Work</span></button>
      <button class="filter-btn" data-filter="live"><span data-i18n="work.filter.live">Live</span></button>
      <button class="filter-btn" data-filter="branding"><span data-i18n="work.filter.branding">Branding</span></button>
      <button class="filter-btn" data-filter="campaign"><span data-i18n="work.filter.campaign">Campaign</span></button>
      <button class="filter-btn" data-filter="website"><span data-i18n="work.filter.website">Website</span></button>
      <button class="filter-btn" data-filter="app"><span data-i18n="work.filter.app">App</span></button>
      <button class="filter-btn" data-filter="ecommerce"><span data-i18n="work.filter.ecommerce">E-Commerce</span></button>
      <button class="filter-btn" data-filter="experience"><span data-i18n="work.filter.experience">Experience</span></button>
    </div>
    <div class="work-grid">

      <div class="work-item featured" data-category="live">
        <div class="work-item-bg c1" style="position:relative;width:100%;height:100%;"><span class="label">LIVE</span></div>
        <div class="work-overlay">
          <div class="work-tag">Live</div>
          <div class="work-name">2024 World Tour — Tokyo Dome</div>
          <div class="work-year">2024</div>
        </div>
      </div>

      <div class="work-item" data-category="branding">
        <div class="work-item-bg c2" style="position:relative;width:100%;height:100%;"><span class="label">BRAND</span></div>
        <div class="work-overlay">
          <div class="work-tag">Branding</div>
          <div class="work-name">X:IN 4th Mini Album</div>
          <div class="work-year">2024</div>
        </div>
      </div>

      <div class="work-item" data-category="campaign">
        <div class="work-item-bg c3" style="position:relative;width:100%;height:100%;"><span class="label">CAMPAIGN</span></div>
        <div class="work-overlay">
          <div class="work-tag">Campaign</div>
          <div class="work-name">LG IFA 2024 Microsite</div>
          <div class="work-year">2024</div>
        </div>
      </div>

      <div class="work-item" data-category="app">
        <div class="work-item-bg c4" style="position:relative;width:100%;height:100%;"><span class="label">APP</span></div>
        <div class="work-overlay">
          <div class="work-tag">App</div>
          <div class="work-name">Wellune UX/UI Design</div>
          <div class="work-year">2023</div>
        </div>
      </div>

      <div class="work-item" data-category="ecommerce">
        <div class="work-item-bg c5" style="position:relative;width:100%;height:100%;"><span class="label">E-COM</span></div>
        <div class="work-overlay">
          <div class="work-tag">E-Commerce</div>
          <div class="work-name">Ophily Brand Mall</div>
          <div class="work-year">2023</div>
        </div>
      </div>

      <div class="work-item" data-category="experience">
        <div class="work-item-bg c6" style="position:relative;width:100%;height:100%;"><span class="label">EXP</span></div>
        <div class="work-overlay">
          <div class="work-tag">Experience</div>
          <div class="work-name">LG Science Park Tour Guide</div>
          <div class="work-year">2023</div>
        </div>
      </div>

    </div>
  </section>

  <grap-footer></grap-footer>
  <script src="js/i18n.js?v=4"></script>
  <script src="js/grap-footer.js"></script>
  <script src="js/grap-init.js"></script>
  <script>
    /* 필터 버튼 동작 */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.work-item').forEach(item => {
          const match = filter === 'all' || item.dataset.category === filter;
          item.style.display = match ? '' : 'none';
        });
        /* featured 클래스: All Work일 때만 첫 번째 visible 아이템에 적용 */
        const visible = Array.from(document.querySelectorAll('.work-item')).filter(i => i.style.display !== 'none');
        visible.forEach((i, idx) => i.classList.toggle('featured', filter === 'all' && idx === 0));
      });
    });
  </script>
</body>
</html>
