<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE GRAP — Global Entertainment & Merch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <!-- GSAP — local -->
  <script src="gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- Three.js — local r128 -->
  <script src="three.min.js"></script>
  <script src="js/grap-header.js"></script>
  <script src="js/i18n.js?v=2"></script>

  <style>
    /* index.html-specific overrides */
    :lang(ko) .hero-desc { word-break: keep-all; }

    /* ── HERO ── */
    #hero {
      position: relative;
      width: 100vw; height: 100svh;
      overflow: hidden; background: var(--c-bg);
    }
    #hero-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    /* Headline — bottom-anchored, oversized */
    .hero-headline {
      position: absolute; z-index: 2;
      left: 0; right: 0;
      bottom: clamp(90px,18vh,180px);
      display: flex; flex-direction: column;
      padding: 0 var(--gutter);
      pointer-events: none;
      overflow: visible;
    }
    .hero-line {
      display: block;
      width: 100%; min-width: 0; max-width: 100%;
      overflow: visible;
      clip-path: inset(-0.5em -9999px 0 -9999px);
      font-family: 'PP Neue Montreal', sans-serif;
      font-weight: 700; text-transform: uppercase;
      font-size: clamp(2.5rem, 10vw, 20rem);
      line-height: .86;
      color: var(--c-on-bg);
      letter-spacing: -.04em;
      white-space: nowrap;
    }
    .hl-left  { text-align: left; margin-left: -0.04em; }
    .hl-right { text-align: right; }
    .hl-inner { display: inline-block; transform: translateY(110%); }
    .hero-headline--mobile { display: none; }

    /* Description — bottom left */
    .hero-desc {
      position: absolute; z-index: 2;
      left: var(--gutter);
      bottom: var(--gutter);
      max-width: 340px;
      font-size: clamp(var(--text-base), 1vw, 1.375rem);
      line-height: 1.5; letter-spacing: .02em; overflow-wrap: break-word;
      color: var(--c-on-bg);
      opacity: 0;
    }

    /* Scroll indicator — bottom right */

    /* ── TABLET ── */
    @media (max-width: 1024px) {
      .hl-right { text-align: right; }
    }

    /* ── TABLET / SMALL DESKTOP (481-768px): 2-line headline + hamburger ── */
    @media (max-width: 768px) {
      .hero-headline { bottom: 22vh; }
    }

    /* ── MOBILE PHONE (≤480px): 4-line headline ── */
    @media (max-width: 480px) {
      .hero-headline--desktop { display: none; }
      .hero-headline--mobile  { display: flex; flex-direction: column; }
      .hero-headline { padding: 0 var(--gutter); bottom: 136px; }
      .hero-line { font-size: calc((100vw - 48px) / 4.1); line-height: .88; }
      .hero-desc { font-size: var(--text-base); max-width: 260px; }
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Header (Web Component) -->
  <grap-header active="index"></grap-header>

  <!-- Hero -->
  <section id="hero">
    <canvas id="hero-canvas"></canvas>

    <!-- Desktop: 2줄 -->
    <h1 class="hero-headline hero-headline--desktop">
      <span class="hero-line hl-left"><span class="hl-inner">FROM GRID</span></span>
      <span class="hero-line hl-right"><span class="hl-inner">TO GROUND</span></span>
    </h1>
    <!-- Mobile: 4줄 -->
    <h1 class="hero-headline hero-headline--mobile">
      <span class="hero-line hl-left"><span class="hl-inner">FROM</span></span>
      <span class="hero-line hl-right"><span class="hl-inner">GRID</span></span>
      <span class="hero-line hl-left"><span class="hl-inner">TO</span></span>
      <span class="hero-line hl-right"><span class="hl-inner">GROUND</span></span>
    </h1>

    <p class="hero-desc" data-i18n="hero_desc">
      정교한 그리드(Grid)에서 시작된 우리의 설계는, 이제 수만 명의 팬이 모이는 거대한 현장(Ground)으로 향합니다.
    </p>

  </section>

<script>
/* ═══════════════════════════════════════════════════
   HERO FLUID — Stable Fluids (Navier-Stokes on GPU)
   Three.js WebGL ping-pong FBO implementation
   Brand color: #CCFF00
═══════════════════════════════════════════════════ */
(function() {
  if (typeof THREE === 'undefined') return;

  /* file://에서 CSS 레이아웃이 완료된 후 초기화하기 위해 rAF로 감쌈 */
  function initFluid() {
  const canvas  = document.getElementById('hero-canvas');

  /* ── Config ── */
  const SIM       = 128;   // simulation grid resolution
  const ITER      = 20;    // pressure Jacobi iterations
  const CURL_STR  = 28;    // vorticity confinement strength
  const VEL_DISS  = 0.982; // velocity decay per frame
  const DYE_DISS  = 0.970; // dye decay per frame
  const FORCE     = 90;    // mouse force multiplier
  const SPLAT_R   = 0.004; // splat radius (UV units²)
  const LIME      = [0.8, 1.0, 0.0]; // #CCFF00 normalized

  /* ── Renderer / scene ── */
  /* file://에서 CSS 미적용 상태로 실행될 수 있어 offsetWidth가 0이 될 수 있음 */
  const W0 = canvas.offsetWidth  || window.innerWidth;
  const H0 = canvas.offsetHeight || window.innerHeight;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setPixelRatio(1);
  renderer.setSize(W0, H0, false);
  renderer.setClearColor(0x000000, 1);

  const scene  = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const quad   = new THREE.Mesh(new THREE.PlaneGeometry(2, 2));
  scene.add(quad);

  /* ── Helpers ── */
  function rt(w, h) {
    return new THREE.WebGLRenderTarget(w, h, {
      minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
      type: THREE.HalfFloatType, format: THREE.RGBAFormat,
      depthBuffer: false, stencilBuffer: false,
    });
  }
  function pp(w, h) {
    const a = rt(w, h), b = rt(w, h);
    return { r: a, w: b, swap() { const t=this.r; this.r=this.w; this.w=t; } };
  }
  function pass(mat, target) {
    quad.material = mat;
    renderer.setRenderTarget(target);
    renderer.render(scene, camera);
  }
  const u  = v  => ({ value: v });
  const V2 = (x,y) => new THREE.Vector2(x,y);
  const V3 = (x,y,z) => new THREE.Vector3(x,y,z);
  const VS = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`;
  function mat(fs, uniforms) {
    return new THREE.ShaderMaterial({ vertexShader: VS, fragmentShader: fs, uniforms });
  }

  /* ── Render targets ── */
  const vel  = pp(SIM, SIM);
  const dye  = pp(SIM, SIM);
  const pres = pp(SIM, SIM);
  const divRT  = rt(SIM, SIM);
  const curlRT = rt(SIM, SIM);
  const ts = V2(1/SIM, 1/SIM);

  /* ── Shaders ── */

  // Splat — inject mouse force + dye
  const mSplat = mat(`
    precision highp float;
    uniform sampler2D uT; uniform vec2 uPt; uniform vec3 uC;
    uniform float uR, uA; varying vec2 vUv;
    void main(){
      vec2 p=vUv-uPt; p.x*=uA;
      float s=exp(-dot(p,p)/uR);
      gl_FragColor=vec4(texture2D(uT,vUv).xyz+s*uC,1.0);
    }`, { uT:u(null), uPt:u(V2()), uC:u(V3()), uR:u(SPLAT_R), uA:u(1) });

  // Curl — vorticity magnitude
  const mCurl = mat(`
    precision highp float;
    uniform sampler2D uV; uniform vec2 uTs; varying vec2 vUv;
    void main(){
      float L=texture2D(uV,vUv-vec2(uTs.x,0)).y, R=texture2D(uV,vUv+vec2(uTs.x,0)).y;
      float B=texture2D(uV,vUv-vec2(0,uTs.y)).x, T=texture2D(uV,vUv+vec2(0,uTs.y)).x;
      gl_FragColor=vec4((R-L-T+B)*.5,0,0,1);
    }`, { uV:u(null), uTs:u(ts.clone()) });

  // Vorticity confinement — prevent artificial dissipation of swirls
  const mVort = mat(`
    precision highp float;
    uniform sampler2D uV,uCurl; uniform float uStr,uDt; uniform vec2 uTs; varying vec2 vUv;
    void main(){
      float L=texture2D(uCurl,vUv-vec2(uTs.x,0)).x, R=texture2D(uCurl,vUv+vec2(uTs.x,0)).x;
      float B=texture2D(uCurl,vUv-vec2(0,uTs.y)).x, T=texture2D(uCurl,vUv+vec2(0,uTs.y)).x;
      float C=texture2D(uCurl,vUv).x;
      vec2 f=normalize(vec2(abs(T)-abs(B),abs(R)-abs(L))+1e-5)*uStr*C;
      gl_FragColor=vec4(texture2D(uV,vUv).xy+f*uDt,0,1);
    }`, { uV:u(null), uCurl:u(null), uStr:u(CURL_STR), uDt:u(0.016), uTs:u(ts.clone()) });

  // Divergence
  const mDiv = mat(`
    precision highp float;
    uniform sampler2D uV; uniform vec2 uTs; varying vec2 vUv;
    void main(){
      float L=texture2D(uV,vUv-vec2(uTs.x,0)).x, R=texture2D(uV,vUv+vec2(uTs.x,0)).x;
      float B=texture2D(uV,vUv-vec2(0,uTs.y)).y, T=texture2D(uV,vUv+vec2(0,uTs.y)).y;
      gl_FragColor=vec4((R-L+T-B)*.5,0,0,1);
    }`, { uV:u(null), uTs:u(ts.clone()) });

  // Pressure solve — Jacobi iteration
  const mPres = mat(`
    precision highp float;
    uniform sampler2D uP,uDiv; uniform vec2 uTs; varying vec2 vUv;
    void main(){
      float L=texture2D(uP,vUv-vec2(uTs.x,0)).x, R=texture2D(uP,vUv+vec2(uTs.x,0)).x;
      float B=texture2D(uP,vUv-vec2(0,uTs.y)).x, T=texture2D(uP,vUv+vec2(0,uTs.y)).x;
      gl_FragColor=vec4((L+R+B+T-texture2D(uDiv,vUv).x)*.25,0,0,1);
    }`, { uP:u(null), uDiv:u(null), uTs:u(ts.clone()) });

  // Gradient subtract — enforce incompressibility
  const mGrad = mat(`
    precision highp float;
    uniform sampler2D uP,uV; uniform vec2 uTs; varying vec2 vUv;
    void main(){
      float L=texture2D(uP,vUv-vec2(uTs.x,0)).x, R=texture2D(uP,vUv+vec2(uTs.x,0)).x;
      float B=texture2D(uP,vUv-vec2(0,uTs.y)).x, T=texture2D(uP,vUv+vec2(0,uTs.y)).x;
      gl_FragColor=vec4(texture2D(uV,vUv).xy-.5*vec2(R-L,T-B),0,1);
    }`, { uP:u(null), uV:u(null), uTs:u(ts.clone()) });

  // Advection — semi-Lagrangian (velocity & dye)
  const mAdv = mat(`
    precision highp float;
    uniform sampler2D uV,uSrc; uniform vec2 uTs; uniform float uDiss; varying vec2 vUv;
    void main(){
      gl_FragColor=uDiss*texture2D(uSrc,vUv-texture2D(uV,vUv).xy*uTs);
    }`, { uV:u(null), uSrc:u(null), uTs:u(ts.clone()), uDiss:u(1) });

  // ── Font atlas: characters rendered to offscreen canvas ──
  const CHARS   = ' .·:-=+*GRAP2026'; // density: space=empty → #=dense
  const NCHARS  = CHARS.length;        // 16
  const CELL_PX = 9;                   // px per cell (determines grid density)
  const atlasCv = document.createElement('canvas');
  atlasCv.width  = NCHARS * CELL_PX;
  atlasCv.height = CELL_PX;
  const ax2d = atlasCv.getContext('2d');
  ax2d.fillStyle = '#000';
  ax2d.fillRect(0, 0, atlasCv.width, atlasCv.height);
  ax2d.fillStyle = '#fff';
  ax2d.font = `bold ${CELL_PX + 1}px "Courier New", monospace`;
  ax2d.textAlign  = 'center';
  ax2d.textBaseline = 'middle';
  for (let i = 0; i < NCHARS; i++) {
    ax2d.fillText(CHARS[i], i * CELL_PX + CELL_PX / 2, CELL_PX / 2);
  }
  const atlasTex = new THREE.CanvasTexture(atlasCv);
  atlasTex.minFilter = THREE.LinearFilter;
  atlasTex.magFilter = THREE.NearestFilter;

  // Display — ASCII character mosaic + fluid warp + lime tint
  const W = canvas.offsetWidth  || window.innerWidth;
  const H = canvas.offsetHeight || window.innerHeight;
  const mDisplay = mat(`
    precision highp float;
    uniform sampler2D uVideo;   /* video texture */
    uniform sampler2D uVel;     /* fluid velocity */
    uniform sampler2D uAtlas;   /* character strip atlas */
    uniform vec2  uRes;         /* canvas resolution px */
    uniform float uCell;        /* cell size px */
    uniform float uNChars;      /* number of chars in atlas */
    varying vec2 vUv;

    void main() {
      /* ── 1. Snap to cell centre ── */
      vec2 cellSz  = vec2(uCell / uRes.x, uCell / uRes.y);
      vec2 cellUV  = floor(vUv / cellSz) * cellSz + cellSz * 0.5;
      vec2 localUV = fract(vUv / cellSz);          /* 0-1 inside the cell */

      /* ── 2. Sample fluid velocity at cell centre ── */
      vec2  vel    = texture2D(uVel, cellUV).xy;
      float velMag = length(vel);

      /* ── 3. Warp video UV by velocity ── */
      vec2 videoUV = cellUV + vel * 0.038;
      vec3 video   = texture2D(uVideo, videoUV).rgb;

      /* ── 4. Luminance → character index ── */
      float luma    = dot(video, vec3(0.299, 0.587, 0.114));
      float charIdx = clamp(floor(luma * uNChars), 0.0, uNChars - 1.0);

      /* ── 5. Sample atlas ── */
      float atlasU = (charIdx + localUV.x) / uNChars;
      float atlasV = 1.0 - localUV.y;              /* flip Y for canvas tex */
      float glyph  = texture2D(uAtlas, vec2(atlasU, atlasV)).r;

      /* ── 6. Colour: lime 50% at rest, full lime where disturbed ── */
      vec3  lime        = vec3(0.8, 1.0, 0.0);
      float disturbance = smoothstep(0.0, 1.4, velMag);
      vec3  charColor   = mix(lime * 0.5, lime, disturbance);

      /* ── 7. Ambient stage-floor glow (always-on base) ── */
      float aax = (vUv.x - .5) * (uRes.x / uRes.y);
      float aay = vUv.y - 1.08;
      float amb = smoothstep(1.0, 0.0, sqrt(aax*aax + aay*aay) * 1.2) * 0.055;

      vec3 finalColor = charColor * glyph + lime * amb * max(glyph, 0.15);
      gl_FragColor = vec4(finalColor, 1.0);
    }
  `, {
    uVideo:  u(null), uVel: u(null), uAtlas: u(atlasTex),
    uRes:    u(V2(W, H)),
    uCell:   u(CELL_PX),
    uNChars: u(NCHARS),
  });

  /* ── Noise fallback texture (always-visible ASCII base) ── */
  const noiseCv = document.createElement('canvas');
  noiseCv.width = 256; noiseCv.height = 256;
  const nCtx = noiseCv.getContext('2d');
  const nImg = nCtx.createImageData(256, 256);
  for (let i = 0; i < nImg.data.length; i += 4) {
    const v = Math.random() * 180 + 20; // 20-200 brightness range
    nImg.data[i] = v; nImg.data[i+1] = v; nImg.data[i+2] = v; nImg.data[i+3] = 255;
  }
  nCtx.putImageData(nImg, 0, 0);
  const noiseTex = new THREE.CanvasTexture(noiseCv);
  noiseTex.minFilter = THREE.LinearFilter;
  noiseTex.magFilter = THREE.LinearFilter;
  mDisplay.uniforms.uVideo.value = noiseTex;

  /* ── Video texture ── */
  const videoEl = document.createElement('video');
  videoEl.src = 'assets/hero-bg.mp4';
  videoEl.loop = true; videoEl.muted = true;
  videoEl.playsInline = true; videoEl.autoplay = true;
  /* crossOrigin 제거 — 같은 서버 자산은 CORS 불필요, file://에서도 안전 */
  videoEl.play().catch(() => {});
  const videoTex = new THREE.VideoTexture(videoEl);
  videoTex.minFilter = THREE.LinearFilter;
  videoTex.magFilter = THREE.LinearFilter;
  videoEl.addEventListener('canplay', () => {
    mDisplay.uniforms.uVideo.value = videoTex;
  });
  videoEl.addEventListener('error', () => {
    /* 에러 시 노이즈 유지 — 이미 설정돼 있음 */
  });

  /* ── Splat helper ── */
  function splat(x, y, dx, dy) {
    const asp = canvas.offsetWidth / canvas.offsetHeight;
    // velocity
    mSplat.uniforms.uT.value = vel.r.texture;
    mSplat.uniforms.uPt.value.set(x, y);
    mSplat.uniforms.uC.value.set(dx * FORCE, dy * FORCE, 0);
    mSplat.uniforms.uA.value = asp;
    pass(mSplat, vel.w); vel.swap();
    // dye
    mSplat.uniforms.uT.value = dye.r.texture;
    mSplat.uniforms.uC.value.set(LIME[0], LIME[1], LIME[2]);
    pass(mSplat, dye.w); dye.swap();
  }

  /* ── Mouse ── */
  let mx=.5, my=.5, pmx=.5, pmy=.5;
  window.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) / r.width;
    my = 1 - (e.clientY - r.top)  / r.height;
  });

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    const w = canvas.offsetWidth, h = canvas.offsetHeight;
    renderer.setSize(w, h, false);
    mDisplay.uniforms.uRes.value.set(w, h);
    mDisplay.uniforms.uCell.value = CELL_PX;
  });

  /* ── Main loop ── */
  const DT = 1 / 60;
  function tick() {
    requestAnimationFrame(tick);

    // Mouse splat
    const dx = mx - pmx, dy = my - pmy;
    if (Math.abs(dx) > 4e-5 || Math.abs(dy) > 4e-5) splat(mx, my, dx, dy);
    pmx = mx; pmy = my;

    // 1. Curl
    mCurl.uniforms.uV.value = vel.r.texture;
    pass(mCurl, curlRT);

    // 2. Vorticity
    mVort.uniforms.uV.value    = vel.r.texture;
    mVort.uniforms.uCurl.value = curlRT.texture;
    mVort.uniforms.uDt.value   = DT;
    pass(mVort, vel.w); vel.swap();

    // 3. Divergence
    mDiv.uniforms.uV.value = vel.r.texture;
    pass(mDiv, divRT);

    // 4. Pressure (Jacobi)
    for (let i = 0; i < ITER; i++) {
      mPres.uniforms.uP.value   = pres.r.texture;
      mPres.uniforms.uDiv.value = divRT.texture;
      pass(mPres, pres.w); pres.swap();
    }

    // 5. Gradient subtract → divergence-free velocity
    mGrad.uniforms.uP.value = pres.r.texture;
    mGrad.uniforms.uV.value = vel.r.texture;
    pass(mGrad, vel.w); vel.swap();

    // 6. Advect velocity
    mAdv.uniforms.uV.value   = vel.r.texture;
    mAdv.uniforms.uSrc.value = vel.r.texture;
    mAdv.uniforms.uDiss.value = VEL_DISS;
    pass(mAdv, vel.w); vel.swap();

    // 7. Advect dye
    mAdv.uniforms.uV.value   = vel.r.texture;
    mAdv.uniforms.uSrc.value = dye.r.texture;
    mAdv.uniforms.uDiss.value = DYE_DISS;
    pass(mAdv, dye.w); dye.swap();

    // 8. Display → screen (ASCII mosaic)
    mDisplay.uniforms.uVel.value   = vel.r.texture;
    mDisplay.uniforms.uAtlas.value = atlasTex;
    quad.material = mDisplay;
    renderer.setRenderTarget(null);
    renderer.render(scene, camera);
  }

  tick();
  } // end initFluid

  requestAnimationFrame(initFluid);
})();


/* ═══════════════════════════════════════════════════
   CURSOR
═══════════════════════════════════════════════════ */
const $cur  = document.getElementById('cursor');
const $ring = document.getElementById('cursor-ring');
let cx=0, cy=0, rx=0, ry=0;

document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  gsap.set($cur, { x: cx, y: cy });
});
gsap.ticker.add(() => {
  rx += (cx - rx) * 0.10;
  ry += (cy - ry) * 0.10;
  gsap.set($ring, { x: rx, y: ry });
});


/* ═══════════════════════════════════════════════════
   i18n — listens for lang changes from grap-header
═══════════════════════════════════════════════════ */
const T = {
  ko: { hero_desc:'정교한 그리드(Grid)에서 시작된 우리의 설계는, 이제 수만 명의 팬이 모이는 거대한 현장(Ground)으로 향합니다.' },
  en: { hero_desc:'Our designs begin with a precise grid, and arrive at the ground where tens of thousands gather.' },
  zh: { hero_desc:'我们的设计始于精密的网格，终于汇聚数万名粉丝的宏大舞台。' },
  ja: { hero_desc:'精密なグリッドから始まった私たちのデザインは、数万人のファンが集まる巨大な現場へと向かいます。' },
};
function applyLang(l) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = T[l]?.[el.dataset.i18n];
    if (k !== undefined) el.innerHTML = k;
  });
}
document.addEventListener('grap:lang', e => applyLang(e.detail.lang));
applyLang(localStorage.getItem('grap-lang') || 'ko');


/* ═══════════════════════════════════════════════════
   HERO ENTRANCE
═══════════════════════════════════════════════════ */
gsap.to('.hl-inner', {
  y: 0, duration: 1.1, ease: 'expo.out', stagger: 0.13, delay: 0.15
});
gsap.to('.hero-desc', {
  opacity: 1, duration: 0.8, ease: 'power2.out', delay: 0.7
});
</script>

<grap-footer></grap-footer>
<script src="js/grap-footer.js"></script>
</body>
</html>
