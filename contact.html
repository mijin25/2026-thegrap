<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTACT — THE GRAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />
  <script>(function(d){var config={kitId:'hty6die',scriptTimeout:3000,async:true},h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,'')+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)})(document);</script>
  <link rel="stylesheet" href="css/base.css" />
  <script src="gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/grap-header.js"></script>
  <style>
    /* ── CONTACT 페이지 전용 스타일 ── */
    .contact-section { padding: clamp(80px,10vw,140px) var(--gutter); }
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 6vw, 80px);
    }
    @media(max-width:768px) { .contact-grid { grid-template-columns: 1fr; gap: 52px; } }

    /* 왼쪽 정보 */
    .contact-info-label {
      font-size: var(--text-sm); letter-spacing: .2em;
      text-transform: uppercase; color: var(--c-secondary);
      margin-bottom: 24px;
    }
    .contact-heading {
      font-family: 'PPNeueMontreal', sans-serif; font-weight: 600;
      font-size: clamp(3rem, 6vw, 7rem);
      line-height: .9; letter-spacing: -.03em;
      color: var(--c-on-bg);
      margin-bottom: clamp(24px, 3vw, 40px);
    }
    html:lang(ko) .contact-heading { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    html:lang(zh-CN) .contact-heading { font-family: 'PPNeueMontreal', 'Noto Sans TC', 'PingFang SC', 'Microsoft JhengHei', sans-serif; }
    html:lang(ja) .contact-heading { font-family: 'PPNeueMontreal', 'Noto Sans JP', 'Hiragino Sans', sans-serif; }
    .contact-body {
      font-size: clamp(0.9375rem, 1.2vw, 1.125rem);
      line-height: 1.75; color: var(--c-secondary);
      max-width: 480px;
    }
    .contact-detail { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
    .contact-divider { height: 1px; background: var(--c-outline); margin: 32px 0; }
    .contact-item-label {
      font-size: 0.8125rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--c-secondary);
      margin-bottom: 4px;
    }
    .contact-item-value {
      font-size: 0.9375rem; color: var(--c-on-bg);
      text-decoration: none; display: block;
      transition: color .2s;
    }
    .contact-item-value:hover { color: var(--c-primary); }
    .contact-sns { display: flex; gap: 16px; margin-top: 4px; }

    /* Form */
    .form-field { margin-bottom: 28px; }
    .form-label {
      display: block; font-size: 0.8125rem; letter-spacing: .15em;
      text-transform: uppercase; color: var(--c-secondary);
      margin-bottom: 12px;
    }
    .form-input, .form-textarea {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid var(--c-outline);
      padding: 12px 0;
      font-family: inherit;
      font-size: 1rem; color: var(--c-on-bg);
      outline: none; transition: border-color .25s;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,.2); }
    .form-input:focus, .form-textarea:focus { border-bottom-color: rgba(255,255,255,.6); }
    .form-textarea { resize: none; height: 120px; }
    .form-submit {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 12px;
      font-family: inherit;
      font-size: var(--text-sm); letter-spacing: .15em;
      text-transform: uppercase;
      background: none; border: none; cursor: pointer;
      color: var(--c-on-bg); padding: 0;
    }
    .form-submit span {
      background-image: linear-gradient(currentColor, currentColor);
      background-repeat: no-repeat;
      background-position: left bottom 0.05em;
      background-size: 0% 1px;
      transition: background-size .4s cubic-bezier(.25,.1,.25,1);
    }
    .form-submit:hover span { background-size: 100% 1px; }
    .form-submit-arrow { transition: transform .3s ease; }
    .form-submit:hover .form-submit-arrow { transform: translate(3px, -3px); }
  </style>
</head>
<body>
  <div id="grain"></div>

  <grap-header active="contact"></grap-header>

  <section class="page-hero">
    <h1 class="page-title page-title--copy">
      <span data-i18n="contact.copy.line1">Let's Make</span>
      <span data-i18n="contact.copy.line2">Something Great.</span>
    </h1>
  </section>

  <section class="contact-section">
    <div class="contact-grid">

      <!-- 왼쪽: 연락처 정보 -->
      <div>
        <p class="contact-info-label reveal" data-i18n="contact.info.label">파트너십 문의</p>
        <h2 class="contact-heading reveal" data-i18n="contact.heading">함께<br>만들어가요.</h2>
        <p class="contact-body reveal" data-i18n="contact.body">
          공연 기획, 굿즈 협업, 브랜드 파트너십 등 모든 비즈니스 문의를 환영합니다. 아이디어가 있다면 언제든지 연락주세요.
        </p>
        <div class="contact-divider reveal"></div>
        <div class="contact-detail">
          <div class="reveal">
            <div class="contact-item-label">Email</div>
            <a href="mailto:thegraper@thegrap.com" class="contact-item-value">thegraper@thegrap.com</a>
          </div>
          <div class="reveal">
            <div class="contact-item-label">Tel</div>
            <a href="tel:+8225461520" class="contact-item-value">+82.2.546.1520</a>
          </div>
          <div class="reveal">
            <div class="contact-item-label">Location</div>
            <span class="contact-item-value" style="cursor:default;">B205, B210, 125, Bongeunsa-ro,<br>Gangnam-gu, Seoul, Korea</span>
          </div>
          <div class="reveal">
            <div class="contact-item-label">SNS</div>
            <div class="contact-sns">
              <a href="https://www.instagram.com/the.grap/" target="_blank" rel="noopener" class="contact-item-value">Instagram</a>
              <a href="https://www.behance.net/thegrap/" target="_blank" rel="noopener" class="contact-item-value">Behance</a>
            </div>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 문의 폼 -->
      <form onsubmit="return false;" class="reveal">
        <div class="form-field">
          <label class="form-label" data-i18n="contact.form.name">이름 / Name</label>
          <input type="text" class="form-input" placeholder="홍길동" />
        </div>
        <div class="form-field">
          <label class="form-label" data-i18n="contact.form.email">이메일 / Email</label>
          <input type="email" class="form-input" placeholder="your@email.com" />
        </div>
        <div class="form-field">
          <label class="form-label" data-i18n="contact.form.company">회사 / 소속</label>
          <input type="text" class="form-input" placeholder="Company / Agency" />
        </div>
        <div class="form-field">
          <label class="form-label" data-i18n="contact.form.message">메시지 / Message</label>
          <textarea class="form-textarea" placeholder="어떤 협업을 생각하고 계신가요?"></textarea>
        </div>
        <button type="submit" class="form-submit">
          <span data-i18n="contact.form.submit">보내기</span>
          <svg class="form-submit-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 13L13 1M13 1H4M13 1V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>

    </div>
  </section>

  <grap-footer></grap-footer>
  <script src="js/i18n.js?v=4"></script>
  <script src="js/grap-footer.js"></script>
  <script src="js/grap-init.js"></script>
</body>
</html>
