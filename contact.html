<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTACT — THE GRAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <script src="gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/grap-header.js"></script>
  <style>
    /* ── CONTACT 페이지 전용 스타일 ── */
    .contact-section { padding: clamp(80px,10vw,140px) var(--gutter); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; max-width: 1200px; margin: 0 auto; }
    @media(max-width:768px) { .contact-grid { grid-template-columns: 1fr; gap: 52px; } }
    .contact-info-label { font-size: var(--text-sm); letter-spacing: .2em; text-transform: uppercase; color: var(--c-secondary); margin-bottom: 20px; }
    .contact-heading { font-family: 'PP Neue Montreal', sans-serif; font-weight: 500; font-size: clamp(2rem,4vw,3.2rem); line-height: .93; letter-spacing: -.025em; color: var(--c-on-bg); margin-bottom: 32px; }
    .contact-body { font-size: 0.9375rem; line-height: 1.88; color: var(--c-on-bg); }
    .contact-detail { display: flex; flex-direction: column; gap: 20px; margin-top: 32px; }
    .contact-divider { height: 1px; background: var(--c-outline); margin: 28px 0; }
    .contact-item-label { font-size: 0.8125rem; letter-spacing: .18em; text-transform: uppercase; color: var(--c-secondary); margin-bottom: 4px; }
    .contact-item-value { font-size: 0.9375rem; color: var(--c-on-bg); text-decoration: none; display: block; transition: color .2s; }
    .contact-item-value:hover { color: var(--c-primary); }
    .contact-sns { display: flex; gap: 16px; margin-top: 4px; }
    /* Form */
    .form-field { margin-bottom: 24px; }
    .form-label { display: block; font-size: 0.8125rem; letter-spacing: .15em; text-transform: uppercase; color: var(--c-secondary); margin-bottom: 10px; }
    .form-input, .form-textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.18); padding: 12px 0; font-family: 'PP Neue Montreal', 'Pretendard', sans-serif; font-size: 0.9375rem; color: var(--c-on-bg); outline: none; transition: border-color .25s; }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,.25); }
    .form-input:focus, .form-textarea:focus { border-bottom-color: rgba(255,255,255,.6); }
    .form-textarea { resize: none; height: 120px; }
    .form-submit { display: inline-block; margin-top: 8px; font-family: 'PP Neue Montreal', sans-serif; font-size: var(--text-sm); letter-spacing: .15em; text-transform: uppercase; padding: 14px 36px; border: 1px solid rgba(255,255,255,.3); background: transparent; color: var(--c-on-bg); cursor: pointer; transition: border-color .3s; position: relative; overflow: hidden; }
    .form-submit::before { content: ''; position: absolute; inset: 0; background: var(--c-primary); transform: translateY(101%); transition: transform .35s cubic-bezier(.4,0,.2,1); }
    .form-submit:hover { border-color: var(--c-primary); color: var(--c-on-primary); }
    .form-submit:hover::before { transform: translateY(0); }
    .form-submit span { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="grain"></div>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <grap-header active="contact"></grap-header>

  <!-- ============================
       페이지 히어로 — 수정 가능
       ============================ -->
  <section class="page-hero">
    <p class="page-label">Get in Touch</p>
    <h1 class="page-title"><span>CONTACT</span></h1>
  </section>

  <!-- ============================
       연락처 & 폼 — 수정 가능
       ============================ -->
  <section class="contact-section">
    <div class="contact-grid">

      <!-- 왼쪽: 연락처 정보 -->
      <div>
        <p class="contact-info-label reveal">파트너십 문의</p>
        <h2 class="contact-heading reveal">함께<br />만들어가요.</h2>
        <p class="contact-body reveal">
          공연 기획, 굿즈 협업, 브랜드 파트너십 등 모든 비즈니스 문의를 환영합니다.
          아이디어가 있다면 언제든지 연락주세요.
        </p>
        <div class="contact-divider reveal"></div>
        <div class="contact-detail">
          <div class="reveal">
            <div class="contact-item-label">Email</div>
            <a href="mailto:thegraper@thegrap.com" class="contact-item-value">thegraper@thegrap.com</a>
          </div>
          <div class="reveal">
            <div class="contact-item-label">Tel</div>
            <a href="tel:+8225461520" class="contact-item-value">+82.2.546.1520</a>
          </div>
          <div class="reveal">
            <div class="contact-item-label">Location</div>
            <span class="contact-item-value" style="cursor:default;">B205, B210, 125, Bongeunsa-ro,<br />Gangnam-gu, Seoul, Korea</span>
          </div>
          <div class="reveal">
            <div class="contact-item-label">SNS</div>
            <div class="contact-sns">
              <a href="https://www.instagram.com/the.grap/" target="_blank" rel="noopener" class="contact-item-value">Instagram</a>
              <a href="https://www.behance.net/thegrap/" target="_blank" rel="noopener" class="contact-item-value">Behance</a>
            </div>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 문의 폼 -->
      <form onsubmit="return false;" class="reveal">
        <div class="form-field">
          <label class="form-label">이름 / Name</label>
          <input type="text" class="form-input" placeholder="홍길동" />
        </div>
        <div class="form-field">
          <label class="form-label">이메일 / Email</label>
          <input type="email" class="form-input" placeholder="your@email.com" />
        </div>
        <div class="form-field">
          <label class="form-label">문의 유형 / Category</label>
          <input type="text" class="form-input" placeholder="Concert / Merch / Partnership" />
        </div>
        <div class="form-field">
          <label class="form-label">메시지 / Message</label>
          <textarea class="form-textarea" placeholder="어떤 협업을 생각하고 계신가요?"></textarea>
        </div>
        <button type="submit" class="form-submit"><span>SEND MESSAGE</span></button>
      </form>

    </div>
  </section>

  <grap-footer></grap-footer>
  <script src="js/grap-footer.js"></script>
  <script src="js/grap-init.js"></script>
</body>
</html>
